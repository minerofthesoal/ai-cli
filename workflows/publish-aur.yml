name: Publish to AUR

on:
  release:
    types: [published]       # triggers when a GitHub release is published
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish to AUR (e.g. 2.8.5.5)'
        required: true
      pkgrel:
        description: 'Package release number (usually 1)'
        required: false
        default: '1'

jobs:
  publish-aur:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Resolve version + pkgrel ─────────────────────────────────────────
      - name: Resolve version
        id: ver
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VER="${{ github.event.inputs.version }}"
            REL="${{ github.event.inputs.pkgrel }}"
          else
            VER="${{ github.event.release.tag_name }}"
            VER="${VER#v}"   # strip leading 'v'
            REL="1"
          fi
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "pkgrel=$REL"  >> $GITHUB_OUTPUT
          echo "Version: $VER, pkgrel: $REL"

      # ── 3. Compute SHA256 of the release tarball ─────────────────────────────
      - name: Compute SHA256
        id: sha
        run: |
          VER="${{ steps.ver.outputs.version }}"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/v${VER}.tar.gz"
          echo "Fetching: $URL"
          SHA=$(curl -sL "$URL" | sha256sum | awk '{print $1}')
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA"

      # ── 4. Generate PKGBUILD ─────────────────────────────────────────────────
      - name: Generate PKGBUILD
        run: |
          VER="${{ steps.ver.outputs.version }}"
          REL="${{ steps.ver.outputs.pkgrel }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          REPO="${{ github.repository }}"

          cat > PKGBUILD << PKEOF
          # Maintainer: minerofthesoal <https://github.com/minerofthesoal>
          # Generated by GitHub Actions — do not edit manually
          # Source: https://github.com/${REPO}

          pkgname=ai-cli
          pkgver=${VER}
          pkgrel=${REL}
          pkgdesc="AI CLI — local + cloud LLM terminal toolkit with 195 models, RLHF, Canvas v3 TUI"
          arch=('any')
          url="https://github.com/${REPO}"
          license=('MIT')
          depends=(
              'bash>=5.0'
              'python>=3.10'
              'curl'
              'git'
          )
          optdepends=(
              'python-pip: for pip install of AI libraries'
              'ffmpeg: audio/video processing'
              'jq: JSON utilities'
              'github-cli: GitHub Gist and repo management'
              'python-torch: local model inference'
              'python-transformers: HuggingFace model support'
          )
          provides=('ai-cli')
          conflicts=('ai-cli-git')
          source=("ai-cli-\${pkgver}.tar.gz::https://github.com/${REPO}/archive/refs/tags/v\${pkgver}.tar.gz")
          sha256sums=('${SHA}')
          b2sums=('SKIP')

          prepare() {
              cd "\$srcdir/ai-cli-\$pkgver"
              # Patch version in script if needed
              sed -i "s/^VERSION=.*/VERSION=\"\$pkgver\"/" main.sh 2>/dev/null || true
          }

          build() {
              # Nothing to compile — it's a bash script
              :
          }

          check() {
              cd "\$srcdir/ai-cli-\$pkgver"
              bash -n main.sh  # syntax check
          }

          package() {
              cd "\$srcdir/ai-cli-\$pkgver"

              # Main binary
              install -Dm755 main.sh "\$pkgdir/usr/bin/ai"

              # Installer helper
              [[ -f install_v3.1.py ]] && \
                  install -Dm755 install_v3.1.py "\$pkgdir/usr/share/ai-cli/install.py"

              # Requirements
              [[ -f requirements.txt ]] && \
                  install -Dm644 requirements.txt "\$pkgdir/usr/share/ai-cli/requirements.txt"

              # package.json (for reference)
              [[ -f package.json ]] && \
                  install -Dm644 package.json "\$pkgdir/usr/share/ai-cli/package.json"

              # License
              [[ -f LICENSE ]] && \
                  install -Dm644 LICENSE "\$pkgdir/usr/share/licenses/\$pkgname/LICENSE"

              # Docs
              [[ -f README.md ]] && \
                  install -Dm644 README.md "\$pkgdir/usr/share/doc/\$pkgname/README.md"

              # Post-install message file
              install -Dm644 /dev/stdin "\$pkgdir/usr/share/ai-cli/install-msg.txt" << 'MSGEOF'
          ╔══════════════════════════════════════════════════════╗
          ║  ai-cli installed successfully!                      ║
          ║                                                      ║
          ║  Quick start:                                        ║
          ║    ai --help                   # show all commands   ║
          ║    ai recommended              # browse 195 models   ║
          ║    ai keys set OPENAI_API_KEY sk-...                 ║
          ║    ai keys set ANTHROPIC_API_KEY sk-ant-...          ║
          ║    ai keys set GROQ_API_KEY gsk_...  (free + fast)   ║
          ║    ai ask "hello"              # your first prompt   ║
          ║    ai aui                      # terminal dashboard  ║
          ╚══════════════════════════════════════════════════════╝
          MSGEOF
          }
          PKEOF

          echo "Generated PKGBUILD:"
          cat PKGBUILD

      # ── 5. Generate .SRCINFO ─────────────────────────────────────────────────
      - name: Generate .SRCINFO
        run: |
          # Install makepkg toolchain
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pacman-package-manager 2>/dev/null || \
          sudo apt-get install -y --no-install-recommends \
            libarchive-tools 2>/dev/null || true

          # Use Python to generate .SRCINFO if makepkg not available
          python3 << 'PYEOF'
          import re

          with open('PKGBUILD') as f:
              content = f.read()

          def get(key, multi=False):
              pat = rf"^{key}=\(?([^\)]*)\)?" if multi else rf"^{key}='?([^'\n]+)'?"
              m = re.search(pat, content, re.M)
              if not m: return []
              if multi:
                  return [x.strip().strip("'\"") for x in m.group(1).split('\n') if x.strip() and not x.strip().startswith('#')]
              return m.group(1).strip().strip("'\"")

          pkgname  = get('pkgname')
          pkgver   = get('pkgver')
          pkgrel   = get('pkgrel')
          pkgdesc  = get('pkgdesc')
          arch     = get('arch', multi=True)
          url      = get('url')
          license_ = get('license', multi=True)
          depends  = get('depends', multi=True)
          optdeps  = get('optdepends', multi=True)
          provides = get('provides', multi=True)
          conflicts= get('conflicts', multi=True)
          source   = get('source', multi=True)
          sha256   = get('sha256sums', multi=True)

          lines = [
              "pkgbase = " + pkgname,
              "\tpkgdesc = " + pkgdesc,
              "\tpkgver = " + pkgver,
              "\tpkgrel = " + pkgrel,
              "\turl = " + url,
          ]
          for a in arch: lines.append(f"\tarch = {a}")
          for l in license_: lines.append(f"\tlicense = {l}")
          for d in depends: lines.append(f"\tdepends = {d}")
          for o in optdeps: lines.append(f"\toptdepends = {o}")
          for p in provides: lines.append(f"\tprovides = {p}")
          for c in conflicts: lines.append(f"\tconflicts = {c}")
          for s in source: lines.append(f"\tsource = {s}")
          for s in sha256: lines.append(f"\tsha256sums = {s}")
          lines.append("")
          lines.append("pkgname = " + pkgname)

          with open('.SRCINFO', 'w') as f:
              f.write('\n'.join(lines) + '\n')

          print("Generated .SRCINFO:")
          print(open('.SRCINFO').read())
          PYEOF

      # ── 6. Publish to AUR ────────────────────────────────────────────────────
      - name: Publish to AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          if [[ -z "$AUR_SSH_KEY" ]]; then
            echo "⚠️  AUR_SSH_KEY secret not set — skipping AUR push"
            echo "To enable: add your AUR SSH private key as Actions secret 'AUR_SSH_KEY'"
            echo "See: https://wiki.archlinux.org/title/AUR_submission_guidelines"
            exit 0
          fi

          # Setup SSH for AUR
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          cat >> ~/.ssh/config << 'SSHEOF'
          Host aur.archlinux.org
              IdentityFile ~/.ssh/aur_key
              User aur
              StrictHostKeyChecking accept-new
          SSHEOF

          # Configure git
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone or init AUR repo
          PKG="ai-cli"
          AUR_REPO="ssh://aur@aur.archlinux.org/${PKG}.git"

          if git clone "$AUR_REPO" aur-repo 2>/dev/null; then
            echo "Cloned existing AUR repo"
          else
            echo "Creating new AUR repo"
            mkdir aur-repo
            cd aur-repo
            git init
            git remote add origin "$AUR_REPO"
            cd ..
          fi

          # Copy generated files
          cp PKGBUILD  aur-repo/PKGBUILD
          cp .SRCINFO  aur-repo/.SRCINFO

          cd aur-repo
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet && { echo "No changes to AUR package"; exit 0; }
          git commit -m "Update to v${{ steps.ver.outputs.version }}"
          git push origin HEAD:master
          echo "✅ Published ai-cli v${{ steps.ver.outputs.version }} to AUR"

      # ── 7. Upload PKGBUILD as artifact ───────────────────────────────────────
      - name: Upload PKGBUILD artifact
        uses: actions/upload-artifact@v4
        with:
          name: PKGBUILD-${{ steps.ver.outputs.version }}
          path: |
            PKGBUILD
            .SRCINFO
          retention-days: 30
