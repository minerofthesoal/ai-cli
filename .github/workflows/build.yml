name: AI CLI Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 3.0.0)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────
  lint:
    name: Lint & Validate
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Validate shell scripts
        run: |
          echo "=== Checking main.sh syntax ==="
          bash -n main.sh
          echo "=== Checking installer scripts ==="
          for f in installers/*.sh; do
            echo "  Checking $f..."
            bash -n "$f" || sh -n "$f"
          done
          echo "All shell scripts valid."

      - name: Validate Python
        run: |
          python3 -m py_compile installers/install.py
          echo "Python installer compiles OK"

      - name: Check C++ syntax
        run: |
          g++ -std=c++17 -fsyntax-only installers/install.cpp
          echo "C++ installer syntax OK"

      - name: Extract version
        id: ver
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VER="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VER="${GITHUB_REF#refs/tags/v}"
          else
            VER=$(grep '^VERSION=' main.sh | head -1 | cut -d'"' -f2)
          fi
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Version: $VER"

    outputs:
      version: ${{ steps.ver.outputs.version }}

  # ── 2. Build .deb ──────────────────────────────────────────────────
  build-deb:
    name: Build .deb
    needs: lint
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev fakeroot lintian

      - name: Build .deb
        id: build
        run: |
          VER="${{ needs.lint.outputs.version }}"
          PKG="ai-cli"
          BUILD="build/${PKG}_${VER}"

          mkdir -p "${BUILD}/usr/bin" \
                   "${BUILD}/usr/share/${PKG}" \
                   "${BUILD}/usr/share/doc/${PKG}" \
                   "${BUILD}/DEBIAN"

          install -m 0755 main.sh "${BUILD}/usr/bin/ai"
          cp -r installers/ "${BUILD}/usr/share/${PKG}/"
          [ -f misc/requirements.txt ] && cp misc/requirements.txt "${BUILD}/usr/share/${PKG}/"
          [ -f README.md ] && cp README.md "${BUILD}/usr/share/doc/${PKG}/"

          cp packaging/debian/control "${BUILD}/DEBIAN/control"
          sed -i "s/^Version:.*/Version: ${VER}/" "${BUILD}/DEBIAN/control"
          cp packaging/debian/postinst "${BUILD}/DEBIAN/"
          cp packaging/debian/prerm "${BUILD}/DEBIAN/"
          chmod 0755 "${BUILD}/DEBIAN/postinst" "${BUILD}/DEBIAN/prerm"

          fakeroot dpkg-deb --build --root-owner-group "${BUILD}"
          DEB="build/${PKG}_${VER}_all.deb"
          mv "build/${PKG}_${VER}.deb" "$DEB" 2>/dev/null || true
          echo "deb_file=${DEB}" >> $GITHUB_OUTPUT
          ls -lh "$DEB"

      - name: Lint .deb
        run: lintian "${{ steps.build.outputs.deb_file }}" || true

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-cli-deb
          path: ${{ steps.build.outputs.deb_file }}
          retention-days: 30

  # ── 3. Build Pacman package ────────────────────────────────────────
  build-pacman:
    name: Build Pacman .pkg.tar.zst
    needs: lint
    runs-on: ubuntu-22.04
    container: archlinux:latest
    timeout-minutes: 15
    steps:
      - name: Install base-devel and git
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed base-devel git sudo

      - name: Create build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - uses: actions/checkout@v4

      - name: Generate PKGBUILD
        run: |
          VER="${{ needs.lint.outputs.version }}"
          mkdir -p /home/builder/pkg
          cd /home/builder/pkg

          # Create a source tarball from the checkout
          SRCDIR="${GITHUB_WORKSPACE}"
          TARBALL="ai-cli-${VER}.tar.gz"
          tar czf "$TARBALL" -C "$(dirname "$SRCDIR")" "$(basename "$SRCDIR")" \
            --transform "s|^$(basename "$SRCDIR")|ai-cli-${VER}|"
          SHA=$(sha256sum "$TARBALL" | awk '{print $1}')

          cat > PKGBUILD << PKGEOF
          # Maintainer: minerofthesoal <https://github.com/minerofthesoal>
          pkgname=ai-cli
          pkgver=${VER}
          pkgrel=1
          pkgdesc="AI CLI — local + cloud LLM terminal toolkit with 195 curated models"
          arch=('any')
          url="https://github.com/minerofthesoal/ai-cli"
          license=('MIT')
          depends=('bash' 'python' 'curl' 'git')
          optdepends=(
              'python-pip: Python package management for ML deps'
              'ffmpeg: Audio/video processing'
              'jq: JSON processing'
              'nodejs: GUI components'
              'npm: GUI package management'
              'github-cli: GitHub integration'
          )
          conflicts=('ai-cli-git')
          source=("ai-cli-${VER}.tar.gz")
          sha256sums=('${SHA}')

          prepare() {
              cd "\${srcdir}/ai-cli-${VER}"
              bash -n main.sh
          }

          check() {
              cd "\${srcdir}/ai-cli-${VER}"
              local ver
              ver=\$(grep '^VERSION=' main.sh | head -1 | cut -d'"' -f2)
              echo "Script version: \$ver"
          }

          package() {
              cd "\${srcdir}/ai-cli-${VER}"
              install -Dm755 main.sh "\${pkgdir}/usr/bin/ai"

              install -Dm644 misc/requirements.txt "\${pkgdir}/usr/share/\${pkgname}/requirements.txt" || true
              install -Dm644 misc/package.json "\${pkgdir}/usr/share/\${pkgname}/package.json" || true

              for f in installers/*.sh installers/*.py; do
                  [ -f "\$f" ] && install -Dm755 "\$f" "\${pkgdir}/usr/share/\${pkgname}/\$f"
              done

              install -Dm644 README.md "\${pkgdir}/usr/share/doc/\${pkgname}/README.md" || true
              install -Dm644 LICENSE "\${pkgdir}/usr/share/licenses/\${pkgname}/LICENSE" || true
          }
          PKGEOF

          # Strip leading whitespace from heredoc
          sed -i 's/^          //' PKGBUILD

          chown -R builder:builder /home/builder/pkg

      - name: Build package
        run: |
          cd /home/builder/pkg
          su builder -c "makepkg -sf --noconfirm"

      - name: Verify package
        run: |
          cd /home/builder/pkg
          ls -lh *.pkg.tar.zst
          su builder -c "pacman -Qip *.pkg.tar.zst"

      - name: Upload pacman artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-cli-pacman
          path: /home/builder/pkg/*.pkg.tar.zst
          retention-days: 30

  # ── 4. Build Pacstall .pacscript ───────────────────────────────────
  build-pacstall:
    name: Build Pacstall .pacscript
    needs: lint
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Generate .pacscript
        id: pac
        run: |
          VER="${{ needs.lint.outputs.version }}"
          REPO="minerofthesoal/ai-cli"
          URL="https://github.com/${REPO}/archive/v${VER}.tar.gz"

          cat > ai-cli.pacscript << PACEOF
          pkgname="ai-cli"
          gives="ai"
          pkgver="${VER}"
          url="${URL}"
          pkgdesc="AI CLI — local + cloud LLM terminal toolkit with 195 curated models"
          repology=("project: ai-cli")
          arch=("any")
          license=("MIT")
          depends=("bash" "python3" "curl" "git")
          optdepends=(
            "ffmpeg: Audio/video processing"
            "jq: JSON processing"
            "python3-pip: Python ML deps"
            "gh: GitHub CLI integration"
            "nodejs: GUI components"
          )
          maintainer=("minerofthesoal <https://github.com/minerofthesoal>")

          install() {
            sudo install -Dm755 "main.sh" -t "/usr/bin/"
            sudo mv "/usr/bin/main.sh" "/usr/bin/ai"

            sudo install -Dm644 "misc/requirements.txt" -t "/usr/share/\${pkgname}/" 2>/dev/null || true
            sudo install -Dm644 "misc/package.json" -t "/usr/share/\${pkgname}/" 2>/dev/null || true

            for f in installers/*.sh installers/*.py; do
              [ -f "\$f" ] && sudo install -Dm755 "\$f" "/usr/share/\${pkgname}/\$f"
            done

            sudo install -Dm644 "README.md" -t "/usr/share/doc/\${pkgname}/" 2>/dev/null || true
            sudo install -Dm644 "LICENSE" -t "/usr/share/licenses/\${pkgname}/" 2>/dev/null || true
          }

          postinst() {
            echo ""
            echo "  ai-cli \${pkgver} installed!"
            echo "  Run: ai --help             to get started"
            echo "  Run: ai recommended        to browse models"
            echo "  Run: ai install-deps       to install Python ML deps"
            echo ""
          }

          removescript() {
            echo "  ai-cli removed. Config at ~/.config/ai-cli/ preserved."
          }
          PACEOF

          # Strip leading whitespace
          sed -i 's/^          //' ai-cli.pacscript

          echo "pacscript=ai-cli.pacscript" >> $GITHUB_OUTPUT
          cat ai-cli.pacscript

      - name: Upload .pacscript artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-cli-pacscript
          path: ai-cli.pacscript
          retention-days: 30

  # ── 5. Compile C++ Installer ───────────────────────────────────────
  build-cpp-installer:
    name: Compile C++ Installer
    needs: lint
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Compile
        run: |
          g++ -std=c++17 -O2 -o ai-cli-installer-linux-x86_64 installers/install.cpp
          chmod +x ai-cli-installer-linux-x86_64
          ls -lh ai-cli-installer-linux-x86_64

      - name: Upload compiled installer
        uses: actions/upload-artifact@v4
        with:
          name: ai-cli-cpp-installer
          path: ai-cli-installer-linux-x86_64
          retention-days: 30

  build-sh-installer:
    name: Package sh Installer
    needs: lint
    runs-on: ubuntu-22.04
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - name: Package
        run: |
          VER="${{ needs.lint.outputs.version }}"
          cp installers/install.sh "ai-cli-${VER}-install.sh"
          chmod +x "ai-cli-${VER}-install.sh"

      - name: Upload sh installer
        uses: actions/upload-artifact@v4
        with:
          name: ai-cli-sh-installer
          path: ai-cli-*-install.sh
          retention-days: 30

  # ── 6. Validate RPM spec ───────────────────────────────────────────
  build-rpm:
    name: Validate RPM spec
    needs: lint
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Validate RPM spec
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y rpm
          echo "RPM spec present and valid:"
          cat packaging/rpm/ai-cli.spec

  # ── 7. Build macOS Installer App (.app in .dmg) ────────────────────
  build-dmg:
    name: Build macOS Installer
    needs: lint
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Build installer app
        run: |
          VER="${{ needs.lint.outputs.version }}"
          APP="AI CLI Installer.app"
          UNAPP="Uninstall AI CLI.app"
          DMG_STAGE="build/dmg-stage"

          mkdir -p "${DMG_STAGE}/${APP}/Contents/MacOS"
          mkdir -p "${DMG_STAGE}/${APP}/Contents/Resources/payload"
          mkdir -p "${DMG_STAGE}/${UNAPP}/Contents/MacOS"
          mkdir -p "${DMG_STAGE}/${UNAPP}/Contents/Resources"

          # Copy payload
          cp main.sh "${DMG_STAGE}/${APP}/Contents/Resources/payload/ai"
          chmod +x "${DMG_STAGE}/${APP}/Contents/Resources/payload/ai"
          cp -r installers/ "${DMG_STAGE}/${APP}/Contents/Resources/payload/" 2>/dev/null || true
          [ -f misc/requirements.txt ] && cp misc/requirements.txt "${DMG_STAGE}/${APP}/Contents/Resources/payload/"
          [ -f LICENSE ] && cp LICENSE "${DMG_STAGE}/${APP}/Contents/Resources/payload/"
          [ -f README.md ] && cp README.md "${DMG_STAGE}/${APP}/Contents/Resources/payload/"

          # Info.plist
          printf '<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0"><dict>\n<key>CFBundleName</key><string>AI CLI Installer</string>\n<key>CFBundleIdentifier</key><string>com.minerofthesoal.ai-cli</string>\n<key>CFBundleVersion</key><string>%s</string>\n<key>CFBundleExecutable</key><string>install</string>\n<key>LSMinimumSystemVersion</key><string>12.0</string>\n<key>CFBundlePackageType</key><string>APPL</string>\n</dict></plist>' "$VER" > "${DMG_STAGE}/${APP}/Contents/Info.plist"

          # Launcher
          printf '#!/bin/bash\nDIR="$(cd "$(dirname "$0")/../Resources/payload" && pwd)"\nopen -a Terminal "$DIR/_do_install.sh"\n' > "${DMG_STAGE}/${APP}/Contents/MacOS/install"
          chmod +x "${DMG_STAGE}/${APP}/Contents/MacOS/install"

          # Install script
          cat > "${DMG_STAGE}/${APP}/Contents/Resources/payload/_do_install.sh" <<INSTEOF
          #!/bin/bash
          set -e
          echo ""; echo "AI CLI v${VER} Installer"; echo ""
          PREFIX="/usr/local"
          DIR="\$(cd "\$(dirname "\$0")" && pwd)"
          if ! /opt/nanobrew/bin/bash --version &>/dev/null 2>&1 && ! /opt/homebrew/bin/bash --version &>/dev/null 2>&1; then
            echo "Installing bash 4+ ..."
            if command -v nanobrew &>/dev/null; then nanobrew install bash 2>/dev/null || true
            elif command -v brew &>/dev/null; then brew install bash 2>/dev/null || true
            else /bin/bash -c "\$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" && brew install bash 2>/dev/null || true
            fi
          fi
          echo "Installing to \${PREFIX}/bin/ai..."
          sudo mkdir -p "\${PREFIX}/bin" "\${PREFIX}/share/ai-cli"
          sudo cp "\${DIR}/ai" "\${PREFIX}/bin/ai"
          sudo chmod +x "\${PREFIX}/bin/ai"
          for f in requirements.txt LICENSE README.md; do [ -f "\${DIR}/\$f" ] && sudo cp "\${DIR}/\$f" "\${PREFIX}/share/ai-cli/"; done
          [ -d "\${DIR}/installers" ] && sudo cp -r "\${DIR}/installers" "\${PREFIX}/share/ai-cli/"
          mkdir -p "\$HOME/.config/ai-cli" 2>/dev/null || true
          echo ""; echo "Done! Run: ai --help"; read -p "Press Enter to close..."
          INSTEOF
          sed -i '' 's/^          //' "${DMG_STAGE}/${APP}/Contents/Resources/payload/_do_install.sh"
          chmod +x "${DMG_STAGE}/${APP}/Contents/Resources/payload/_do_install.sh"

          # Uninstaller
          printf '<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0"><dict>\n<key>CFBundleName</key><string>Uninstall AI CLI</string>\n<key>CFBundleIdentifier</key><string>com.minerofthesoal.ai-cli-uninstall</string>\n<key>CFBundleVersion</key><string>%s</string>\n<key>CFBundleExecutable</key><string>uninstall</string>\n<key>LSMinimumSystemVersion</key><string>12.0</string>\n<key>CFBundlePackageType</key><string>APPL</string>\n</dict></plist>' "$VER" > "${DMG_STAGE}/${UNAPP}/Contents/Info.plist"
          printf '#!/bin/bash\necho "Removing ai-cli..."\nsudo rm -f /usr/local/bin/ai\nsudo rm -rf /usr/local/share/ai-cli\necho "Done. Config at ~/.config/ai-cli/ preserved."\nread -p "Press Enter..."\n' > "${DMG_STAGE}/${UNAPP}/Contents/Resources/uninstall.sh"
          chmod +x "${DMG_STAGE}/${UNAPP}/Contents/Resources/uninstall.sh"
          printf '#!/bin/bash\nDIR="$(cd "$(dirname "$0")/../Resources" && pwd)"\nopen -a Terminal "$DIR/uninstall.sh"\n' > "${DMG_STAGE}/${UNAPP}/Contents/MacOS/uninstall"
          chmod +x "${DMG_STAGE}/${UNAPP}/Contents/MacOS/uninstall"

          # README
          printf 'AI CLI v%s\n\nDouble-click "AI CLI Installer" to install.\nDouble-click "Uninstall AI CLI" to remove.\n' "$VER" > "${DMG_STAGE}/README.txt"

          # Build DMG
          hdiutil create -volname "AI CLI ${VER}" -srcfolder "${DMG_STAGE}" -ov -format UDZO "build/AI-CLI-${VER}-macOS.dmg"
          ls -lh build/*.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: ai-cli-dmg
          path: build/*.dmg
          retention-days: 30

  # ── 8. Build Windows Installer (.exe) ───────────────────────────────
  build-windows:
    name: Build Windows Installer
    needs: lint
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup environment
        shell: bash
        run: |
          VER="${{ needs.lint.outputs.version }}"
          echo "VERSION=$VER" >> $GITHUB_ENV

      - name: Create installer with Inno Setup
        shell: bash
        run: |
          VER="${VERSION}"
          PKG="ai-cli"
          BDIR="build/win"
          mkdir -p "${BDIR}/bin" "${BDIR}/share" "${BDIR}/installers"

          cp main.sh "${BDIR}/bin/ai.sh"
          cp -r installers/* "${BDIR}/installers/" 2>/dev/null || true
          cp misc/requirements.txt "${BDIR}/share/" 2>/dev/null || true
          cp README.md "${BDIR}/share/" 2>/dev/null || true
          cp LICENSE "${BDIR}/share/" 2>/dev/null || true

          # Create ai.cmd wrapper
          cat > "${BDIR}/bin/ai.cmd" << 'CMDEOF'
          @echo off
          setlocal
          where bash >nul 2>&1 && (
            bash "%~dp0ai.sh" %*
          ) || (
            echo ai-cli requires bash. Install Git for Windows or WSL.
            echo https://git-scm.com/download/win
            exit /b 1
          )
          CMDEOF
          sed -i 's/^          //' "${BDIR}/bin/ai.cmd"

          # Create PowerShell installer
          cat > "${BDIR}/install.ps1" << 'PSEOF'
          # AI CLI Installer for Windows
          $ErrorActionPreference = "Stop"
          Write-Host "`nAI CLI Installer" -ForegroundColor Cyan
          Write-Host "================`n"

          # Check for bash
          $bash = Get-Command bash -ErrorAction SilentlyContinue
          if (-not $bash) {
              Write-Host "bash not found. Install one of:" -ForegroundColor Yellow
              Write-Host "  1. Git for Windows: https://git-scm.com/download/win"
              Write-Host "  2. WSL: wsl --install (in PowerShell as Admin)"
              Write-Host ""
              $choice = Read-Host "Install Git for Windows now? (Y/n)"
              if ($choice -ne 'n') {
                  Write-Host "Downloading Git for Windows..."
                  $url = "https://github.com/git-for-windows/git/releases/latest/download/Git-64-bit.exe"
                  $out = "$env:TEMP\git-installer.exe"
                  Invoke-WebRequest -Uri $url -OutFile $out
                  Start-Process -Wait $out
              }
          }

          # Install to Program Files
          $dest = "$env:ProgramFiles\ai-cli"
          Write-Host "Installing to: $dest"
          New-Item -ItemType Directory -Force -Path "$dest\bin" | Out-Null
          New-Item -ItemType Directory -Force -Path "$dest\share" | Out-Null

          Copy-Item "bin\ai.sh" "$dest\bin\" -Force
          Copy-Item "bin\ai.cmd" "$dest\bin\" -Force
          Copy-Item "share\*" "$dest\share\" -Force -ErrorAction SilentlyContinue
          Copy-Item "installers\*" "$dest\share\" -Force -ErrorAction SilentlyContinue

          # Add to PATH
          $path = [Environment]::GetEnvironmentVariable("Path", "Machine")
          if ($path -notlike "*ai-cli*") {
              [Environment]::SetEnvironmentVariable("Path", "$path;$dest\bin", "Machine")
              Write-Host "Added to system PATH" -ForegroundColor Green
          }

          Write-Host "`nai-cli installed!" -ForegroundColor Green
          Write-Host "  Restart your terminal, then run: ai --help`n"
          PSEOF
          sed -i 's/^          //' "${BDIR}/install.ps1"

          # Create Inno Setup script
          cat > "build/setup.iss" << ISSEOF
          [Setup]
          AppName=AI CLI
          AppVersion=${VER}
          AppPublisher=minerofthesoal
          AppPublisherURL=https://github.com/minerofthesoal/ai-cli
          DefaultDirName={autopf}\ai-cli
          DefaultGroupName=AI CLI
          OutputDir=.
          OutputBaseFilename=ai-cli-${VER}-windows-setup
          Compression=lzma2
          SolidCompression=yes
          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible
          MinVersion=10.0.19044
          LicenseFile=win\share\LICENSE
          ChangesEnvironment=yes

          [Files]
          Source: "win\bin\ai.sh"; DestDir: "{app}\bin"; Flags: ignoreversion
          Source: "win\bin\ai.cmd"; DestDir: "{app}\bin"; Flags: ignoreversion
          Source: "win\share\*"; DestDir: "{app}\share"; Flags: ignoreversion recursesubdirs
          Source: "win\installers\*"; DestDir: "{app}\installers"; Flags: ignoreversion recursesubdirs

          [Icons]
          Name: "{group}\AI CLI (Git Bash)"; Filename: "{cmd}"; Parameters: "/k ""{app}\bin\ai.cmd"" --help"
          Name: "{group}\Uninstall AI CLI"; Filename: "{uninstallexe}"

          [Registry]
          Root: HKLM; Subkey: "SYSTEM\CurrentControlSet\Control\Session Manager\Environment"; \
            ValueType: expandsz; ValueName: "Path"; ValueData: "{olddata};{app}\bin"; \
            Check: NeedsAddPath('{app}\bin')

          [Code]
          function NeedsAddPath(Param: string): boolean;
          var
            OrigPath: string;
          begin
            if not RegQueryStringValue(HKEY_LOCAL_MACHINE,
              'SYSTEM\CurrentControlSet\Control\Session Manager\Environment',
              'Path', OrigPath) then
            begin
              Result := True;
              exit;
            end;
            Result := Pos(';' + Param + ';', ';' + OrigPath + ';') = 0;
          end;

          [Run]
          Filename: "{cmd}"; Parameters: "/k echo AI CLI v${VER} installed! Run: ai --help"; \
            Description: "Open terminal"; Flags: postinstall nowait
          ISSEOF
          sed -i 's/^          //' "build/setup.iss"

      - name: Compile installer with Inno Setup
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.4
        with:
          path: build/setup.iss

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: ai-cli-windows-installer
          path: build/ai-cli-*-windows-setup.exe
          retention-days: 30

      - name: Upload PowerShell installer
        uses: actions/upload-artifact@v4
        with:
          name: ai-cli-windows-ps1
          path: build/win/install.ps1
          retention-days: 30

  # ── 9. Release (runs after all builds, only on tags) ───────────────
  release:
    name: Create GitHub Release
    needs: [lint, build-deb, build-pacman, build-pacstall, build-cpp-installer, build-sh-installer, build-rpm, build-dmg, build-windows]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VER="${GITHUB_REF#refs/tags/v}"
            TAG="${GITHUB_REF#refs/tags/}"
          else
            VER=$(grep '^VERSION=' main.sh | head -1 | cut -d'"' -f2)
            TAG="v${VER}"
            # Create the tag if it doesn't exist
            git tag "$TAG" 2>/dev/null || true
            git push origin "$TAG" 2>/dev/null || true
          fi
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Release: $TAG (v$VER)"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: find artifacts/ -type f -ls 2>/dev/null || echo "No artifacts"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ai-cli v${{ steps.ver.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.version, '-') }}
          generate_release_notes: true
          body: |
            ## ai-cli v${{ steps.ver.outputs.version }}

            ### Install

            **Universal (any Linux/macOS/WSL):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/installers/install.sh | sh
            ```

            **Debian / Ubuntu / Mint (.deb):**
            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/${{ steps.ver.outputs.tag }}/ai-cli_${{ steps.ver.outputs.version }}_all.deb
            sudo dpkg -i ai-cli_${{ steps.ver.outputs.version }}_all.deb
            sudo apt-get install -f
            ```

            **Arch Linux (pacman .pkg.tar.zst):**
            ```bash
            # Download from this release, then:
            sudo pacman -U ai-cli-${{ steps.ver.outputs.version }}-1-any.pkg.tar.zst
            ```

            **Arch Linux (AUR):**
            ```bash
            yay -S ai-cli
            # or: paru -S ai-cli
            ```

            **Pacstall (Ubuntu):**
            ```bash
            pacstall -I ai-cli
            ```

            **Fedora / RHEL / openSUSE:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/installers/install-rpm.sh | sh
            ```

            **macOS (Intel & Apple Silicon):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/installers/install-mac.sh | sh
            # Requires nanobrew or Homebrew. Install bash 4+:
            nanobrew install bash    # or: brew install bash
            ```

            **macOS (.dmg — Intel & Apple Silicon):**
            Download the `.dmg`, open it, double-click "AI CLI Installer"

            **Python installer:**
            ```bash
            python3 <(curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/installers/install.py)
            ```

            **Windows 10 21H2+ (.exe installer):**
            Download `ai-cli-${{ steps.ver.outputs.version }}-windows-setup.exe` and run it.
            Requires Git for Windows (Git Bash) or WSL.

            **C++ installer (precompiled Linux):**
            ```bash
            chmod +x ai-cli-installer-linux-x86_64 && ./ai-cli-installer-linux-x86_64
            ```

            **iSH (iOS):**
            ```bash
            apk add curl bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/installers/install.sh | bash
            ai install-deps
            ai recommended download 1
            ai ask "Hello!"
            ```
          files: |
            artifacts/**/*
